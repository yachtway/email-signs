    }

    #content {
      display: flex;
      flex-direction: column;
      gap: 24px;
      align-items: flex-start;
    }

    .signature-container {
      background: transparent;
      border: none;
      border-radius: 0;
      padding: 0;
      box-shadow: none;
    }

    .signature-preview {
      margin-top: 14px;
      overflow-x: auto;
    }

    .copy-button {
      background: #22222d;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 14px;
      line-height: 20px;
      transition: background-color 0.2s ease;
    }

    .copy-button:hover {
      background: #2f2f39;
    }

    .copy-button.copied {
      background: #167c4b;
    }
  </style>
